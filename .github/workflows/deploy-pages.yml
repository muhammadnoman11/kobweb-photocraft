name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Export static site (Kobweb)
        run: ./gradlew :site:kobwebExport --stacktrace --info

      - name: Fix Kobweb Pages structure
        run: |
          mkdir -p site/.kobweb/site
          
          # ensure index.html is at root for GitHub Pages
          cp site/.kobweb/site/system/index.html site/.kobweb/site/index.html || true
          
          # copy JS files
          cp site/.kobweb/site/system/*.js* site/.kobweb/site/ || true
          
          # copy resources
          cp -R site/.kobweb/site/resources/* site/.kobweb/site/ || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/.kobweb/site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4